    put:
      tags:
        - ShareTransactions
      summary: Bulk update ShareTransactions (full, atomic)
      operationId: bulkUpdateShareTransactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                allOf:
                  - type: object
                    required: [id]
                    properties:
                      id:
                        type: string
                  - $ref: '#/components/schemas/UpdateShareTransactionRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareTransactionBulkResult'
        '400':
          $ref: '#/components/responses/BadRequest'
